# ai-team Project Configuration
#
# This file is generated by `sdd-scout` during `/ai-team init`.
# It describes the project's tech stack, conventions, and structure.
# Customize after generation to match your project's specific needs.

project:
  name: "{project-name}"          # From package.json, composer.json, or directory name
  type: "{app|library|monorepo}"  # Project type
  description: ""                 # Optional: one-line project description

stack:
  languages:
    - name: "{language}"          # e.g., typescript, php, python, go, rust
      version: "{version}"       # e.g., "5.x", "8.3"
  frameworks:
    - name: "{framework}"        # e.g., react, next, symfony, laravel, nestjs
      version: "{version}"
  testing:
    - name: "{test-framework}"   # e.g., vitest, jest, phpunit, playwright
  styling:
    - name: "{css-framework}"    # e.g., tailwind, styled-components
      version: "{version}"
  package_manager: "{manager}"   # e.g., pnpm, yarn, npm, bun, composer

conventions:
  # Detected from config files (tsconfig, eslint, prettier, etc.)
  # Examples:
  # - "strict TypeScript (strict: true)"
  # - "ESM modules only"
  # - "path aliases via @/"
  # - "conventional commits"

structure:
  source: "{src-dir}/"           # e.g., src/, app/, lib/
  tests: "{test-pattern}"        # e.g., src/**/*.test.ts, tests/
  components: "{components-dir}" # e.g., src/components/
  # Add more as needed:
  # api: "src/api/"
  # pages: "src/app/"
  # styles: "src/styles/"

# Custom rules for AI agents (optional)
rules:
  # Examples:
  # - "Never use default exports"
  # - "Always use server actions for mutations"
  # - "Database queries go through repository pattern"
